name: price-analysis-service

on:
  push:
    branches: [main, master]
    paths:
      - "price-analysis-service/**"
      - "shared/**"
      - ".github/workflows/price-analysis-service.yml"
      - "Simcag.PriceAnalysisService.Api/**"
      - "Simcag.PriceAnalysisService.Application/**"
      - "Simcag.PriceAnalysisService.Domain/**"
      - "Simcag.PriceAnalysisService.Infrastructure/**"
      - "Simcag.PriceAnalysisService.Tests/**"
  pull_request:
    paths:
      - "price-analysis-service/**"
      - "shared/**"
      - ".github/workflows/price-analysis-service.yml"
      - "Simcag.PriceAnalysisService.Api/**"
      - "Simcag.PriceAnalysisService.Application/**"
      - "Simcag.PriceAnalysisService.Domain/**"
      - "Simcag.PriceAnalysisService.Infrastructure/**"
      - "Simcag.PriceAnalysisService.Tests/**"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Ensure shared exists
        shell: bash
        env:
          SIMCAG_MONOREPO_REPOSITORY: ${{ vars.SIMCAG_MONOREPO_REPOSITORY }}
          SIMCAG_MONOREPO_CLONE_TOKEN: ${{ secrets.SIMCAG_MONOREPO_CLONE_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -f shared/shared.csproj ]]; then
            exit 0
          fi
          if [[ -z "${SIMCAG_MONOREPO_REPOSITORY:-}" ]]; then
            echo "::error::Falta shared/ na raiz. Opções: (1) git submodule com shared, (2) commitar a pasta shared/ neste repo, (3) no GitHub: Settings → Secrets and variables → Actions → Variables → crie SIMCAG_MONOREPO_REPOSITORY com o monorepo (ex.: shelow/simcag) para o CI clonar só o que precisa. Monorepo privado: secret SIMCAG_MONOREPO_CLONE_TOKEN (PAT com leitura do repositório)."
            exit 1
          fi
          echo "A obter shared/ a partir de ${SIMCAG_MONOREPO_REPOSITORY}…"
          rm -rf .simcag-mono-tmp
          if [[ -n "${SIMCAG_MONOREPO_CLONE_TOKEN:-}" ]]; then
            git clone --depth 1 "https://x-access-token:${SIMCAG_MONOREPO_CLONE_TOKEN}@github.com/${SIMCAG_MONOREPO_REPOSITORY}.git" .simcag-mono-tmp
          else
            git clone --depth 1 "https://github.com/${SIMCAG_MONOREPO_REPOSITORY}.git" .simcag-mono-tmp
          fi
          [[ -d .simcag-mono-tmp/shared ]] || { echo "::error::O repositório ${SIMCAG_MONOREPO_REPOSITORY} não contém a pasta shared/ na raiz."; exit 1; }
          mv .simcag-mono-tmp/shared .
          rm -rf .simcag-mono-tmp
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - name: Test
        shell: bash
        run: |
          set -e
          if [[ -f price-analysis-service/Simcag.PriceAnalysisService.Tests/Simcag.PriceAnalysisService.Tests.csproj ]]; then
            dotnet test price-analysis-service/Simcag.PriceAnalysisService.Tests/Simcag.PriceAnalysisService.Tests.csproj -c Release
          else
            dotnet test Simcag.PriceAnalysisService.Tests/Simcag.PriceAnalysisService.Tests.csproj -c Release
          fi

  build-and-push:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Ensure shared exists
        shell: bash
        env:
          SIMCAG_MONOREPO_REPOSITORY: ${{ vars.SIMCAG_MONOREPO_REPOSITORY }}
          SIMCAG_MONOREPO_CLONE_TOKEN: ${{ secrets.SIMCAG_MONOREPO_CLONE_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -f shared/shared.csproj ]]; then
            exit 0
          fi
          if [[ -z "${SIMCAG_MONOREPO_REPOSITORY:-}" ]]; then
            echo "::error::Falta shared/ na raiz. Opções: (1) git submodule com shared, (2) commitar a pasta shared/ neste repo, (3) no GitHub: Settings → Secrets and variables → Actions → Variables → crie SIMCAG_MONOREPO_REPOSITORY com o monorepo (ex.: shelow/simcag) para o CI clonar só o que precisa. Monorepo privado: secret SIMCAG_MONOREPO_CLONE_TOKEN (PAT com leitura do repositório)."
            exit 1
          fi
          echo "A obter shared/ a partir de ${SIMCAG_MONOREPO_REPOSITORY}…"
          rm -rf .simcag-mono-tmp
          if [[ -n "${SIMCAG_MONOREPO_CLONE_TOKEN:-}" ]]; then
            git clone --depth 1 "https://x-access-token:${SIMCAG_MONOREPO_CLONE_TOKEN}@github.com/${SIMCAG_MONOREPO_REPOSITORY}.git" .simcag-mono-tmp
          else
            git clone --depth 1 "https://github.com/${SIMCAG_MONOREPO_REPOSITORY}.git" .simcag-mono-tmp
          fi
          [[ -d .simcag-mono-tmp/shared ]] || { echo "::error::O repositório ${SIMCAG_MONOREPO_REPOSITORY} não contém a pasta shared/ na raiz."; exit 1; }
          mv .simcag-mono-tmp/shared .
          rm -rf .simcag-mono-tmp
      - name: Resolve Docker context (monorepo vs. service-only repo)
        id: ctx
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f price-analysis-service/Simcag.PriceAnalysisService.Api/Dockerfile ]]; then
            echo "layout=monorepo" >> "$GITHUB_OUTPUT"
            echo "context=." >> "$GITHUB_OUTPUT"
            echo "file=price-analysis-service/Simcag.PriceAnalysisService.Api/Dockerfile" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [[ ! -d Simcag.PriceAnalysisService.Api ]]; then
            echo "::error::Dockerfile não encontrado em layout monorepo nem pastas Simcag.* na raiz."
            exit 1
          fi
          if [[ ! -f shared/shared.csproj ]]; then
            echo "::error::shared/shared.csproj em falta após o passo de preparação."
            exit 1
          fi
          mkdir -p .docker-layout/price-analysis-service
          shopt -s nullglob
          for d in Simcag.PriceAnalysisService.*; do
            [[ -d "$d" ]] && mv "$d" .docker-layout/price-analysis-service/
          done
          mv shared .docker-layout/
          echo "layout=flat" >> "$GITHUB_OUTPUT"
          echo "context=.docker-layout" >> "$GITHUB_OUTPUT"
          echo "file=.docker-layout/price-analysis-service/Simcag.PriceAnalysisService.Api/Dockerfile" >> "$GITHUB_OUTPUT"
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          push: true
          context: ${{ steps.ctx.outputs.context }}
          file: ${{ steps.ctx.outputs.file }}
          tags: shelow/price-analysis-service:latest
