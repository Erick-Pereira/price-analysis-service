# Secrets: DOCKER_USERNAME, DOCKER_PASSWORD, TOKEN (PAT read:packages no GitHub Packages do dono do repo)

name: price-analysis-service

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: GitHub Packages (Simcag.Shared)
        env:
          TOKEN: ${{ secrets.TOKEN }}
        run: |
          dotnet nuget remove source github 2>/dev/null || true
          dotnet nuget add source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" \
            --name github \
            --username "${{ github.repository_owner }}" \
            --password "${TOKEN}" \
            --store-password-in-clear-text

      - name: Run tests
        run: dotnet test Simcag.PriceAnalysisService.Tests/Simcag.PriceAnalysisService.Tests.csproj -c Release

  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: shelow/price-analysis-service:latest
          context: .
          file: Simcag.PriceAnalysisService.Api/Dockerfile
          build-args: |
            TOKEN=${{ secrets.TOKEN }}
            NUGET_GITHUB_OWNER=${{ github.repository_owner }}
