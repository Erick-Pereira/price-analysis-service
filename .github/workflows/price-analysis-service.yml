# Secrets no GitHub (só estes): DOCKER_USERNAME, DOCKER_PASSWORD, TOKEN
# TOKEN = PAT com leitura do monorepo https://github.com/<dono-do-repo>/simcag (para copiar shared/ no CI do repo só do serviço).

name: price-analysis-service

on:
  push:
    branches: [main, master]
    paths:
      - "price-analysis-service/**"
      - "shared/**"
      - ".github/workflows/price-analysis-service.yml"
      - "Simcag.PriceAnalysisService.Api/**"
      - "Simcag.PriceAnalysisService.Application/**"
      - "Simcag.PriceAnalysisService.Domain/**"
      - "Simcag.PriceAnalysisService.Infrastructure/**"
      - "Simcag.PriceAnalysisService.Tests/**"
  pull_request:
    paths:
      - "price-analysis-service/**"
      - "shared/**"
      - ".github/workflows/price-analysis-service.yml"
      - "Simcag.PriceAnalysisService.Api/**"
      - "Simcag.PriceAnalysisService.Application/**"
      - "Simcag.PriceAnalysisService.Domain/**"
      - "Simcag.PriceAnalysisService.Infrastructure/**"
      - "Simcag.PriceAnalysisService.Tests/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Obter shared se em falta (repo só do serviço)
        shell: bash
        env:
          SIMCAG_MONOREPO: ${{ format('{0}/simcag', github.repository_owner) }}
          TOKEN: ${{ secrets.TOKEN }}
        run: |
          set -euo pipefail
          if [[ -f shared/shared.csproj ]] || [[ -f price-analysis-service/Simcag.PriceAnalysisService.Api/Dockerfile ]]; then
            exit 0
          fi
          echo "A clonar ${SIMCAG_MONOREPO} (shallow) para copiar shared/…"
          rm -rf .simcag-mono-tmp
          if [[ -n "${TOKEN:-}" ]]; then
            git clone --depth 1 "https://x-access-token:${TOKEN}@github.com/${SIMCAG_MONOREPO}.git" .simcag-mono-tmp
          elif git clone --depth 1 "https://github.com/${SIMCAG_MONOREPO}.git" .simcag-mono-tmp 2>/dev/null; then
            :
          else
            echo "::error::Não foi possível clonar ${SIMCAG_MONOREPO}. Defina o secret TOKEN (PAT com leitura do monorepo) ou adicione shared/ como submodule na raiz."
            exit 1
          fi
          [[ -d .simcag-mono-tmp/shared ]] || { echo "::error::${SIMCAG_MONOREPO} não contém shared/ na raiz."; exit 1; }
          mv .simcag-mono-tmp/shared .
          rm -rf .simcag-mono-tmp
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - name: Test
        shell: bash
        run: |
          set -e
          if [[ -f price-analysis-service/Simcag.PriceAnalysisService.Tests/Simcag.PriceAnalysisService.Tests.csproj ]]; then
            dotnet test price-analysis-service/Simcag.PriceAnalysisService.Tests/Simcag.PriceAnalysisService.Tests.csproj -c Release
          else
            dotnet test Simcag.PriceAnalysisService.Tests/Simcag.PriceAnalysisService.Tests.csproj -c Release
          fi

  build-and-push:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Obter shared se em falta (repo só do serviço)
        shell: bash
        env:
          SIMCAG_MONOREPO: ${{ format('{0}/simcag', github.repository_owner) }}
          TOKEN: ${{ secrets.TOKEN }}
        run: |
          set -euo pipefail
          if [[ -f shared/shared.csproj ]] || [[ -f price-analysis-service/Simcag.PriceAnalysisService.Api/Dockerfile ]]; then
            exit 0
          fi
          echo "A clonar ${SIMCAG_MONOREPO} (shallow) para copiar shared/…"
          rm -rf .simcag-mono-tmp
          if [[ -n "${TOKEN:-}" ]]; then
            git clone --depth 1 "https://x-access-token:${TOKEN}@github.com/${SIMCAG_MONOREPO}.git" .simcag-mono-tmp
          elif git clone --depth 1 "https://github.com/${SIMCAG_MONOREPO}.git" .simcag-mono-tmp 2>/dev/null; then
            :
          else
            echo "::error::Não foi possível clonar ${SIMCAG_MONOREPO}. Defina o secret TOKEN (PAT com leitura do monorepo) ou adicione shared/ como submodule na raiz."
            exit 1
          fi
          [[ -d .simcag-mono-tmp/shared ]] || { echo "::error::${SIMCAG_MONOREPO} não contém shared/ na raiz."; exit 1; }
          mv .simcag-mono-tmp/shared .
          rm -rf .simcag-mono-tmp
      - name: Resolve Docker context (monorepo vs. service-only repo)
        id: ctx
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f price-analysis-service/Simcag.PriceAnalysisService.Api/Dockerfile ]]; then
            echo "layout=monorepo" >> "$GITHUB_OUTPUT"
            echo "context=." >> "$GITHUB_OUTPUT"
            echo "file=price-analysis-service/Simcag.PriceAnalysisService.Api/Dockerfile" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [[ ! -d Simcag.PriceAnalysisService.Api ]]; then
            echo "::error::Esperado monorepo (pasta price-analysis-service/) ou repo do serviço com Simcag.PriceAnalysisService.* na raiz."
            exit 1
          fi
          if [[ ! -f shared/shared.csproj ]]; then
            echo "::error::Falta shared/shared.csproj após o passo de clone. Defina o secret TOKEN ou submodule shared/."
            exit 1
          fi
          mkdir -p .docker-layout/price-analysis-service
          shopt -s nullglob
          for d in Simcag.PriceAnalysisService.*; do
            [[ -d "$d" ]] && mv "$d" .docker-layout/price-analysis-service/
          done
          mv shared .docker-layout/
          echo "layout=flat" >> "$GITHUB_OUTPUT"
          echo "context=.docker-layout" >> "$GITHUB_OUTPUT"
          echo "file=.docker-layout/price-analysis-service/Simcag.PriceAnalysisService.Api/Dockerfile" >> "$GITHUB_OUTPUT"
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          push: true
          context: ${{ steps.ctx.outputs.context }}
          file: ${{ steps.ctx.outputs.file }}
          tags: shelow/price-analysis-service:latest
