name: price-analysis-service CI/CD

on:
  push:
    branches: [main, master, develop]
    paths:
      - "price-analysis-service/**"
      - "shared/**"
      - ".github/workflows/price-analysis-service.yml"
  pull_request:
    paths:
      - "price-analysis-service/**"
      - "shared/**"
      - ".github/workflows/price-analysis-service.yml"
  workflow_dispatch:
    inputs:
      publish:
        description: "Force publish even on PR"
        required: false
        default: false

env:
  REGISTRY: docker.io
  IMAGE_NAME: shelow/price-analysis-service
  DOTNET_VERSION: "10.0.x"

concurrency:
  group: price-analysis-service-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dotnet-version: ["10.0.x"]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET ${{ matrix.dotnet-version }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ matrix.dotnet-version }}
          cache: true
          cache-dependency-path: "price-analysis-service/**/packages.lock.json"

      - name: Restore dependencies
        run: dotnet restore price-analysis-service/
        
      - name: Build
        run: dotnet build price-analysis-service/Simcag.PriceAnalysisService.Api/Simcag.PriceAnalysisService.Api.csproj -c Release --no-restore

      - name: Run unit tests
        run: dotnet test price-analysis-service/Simcag.PriceAnalysisService.Tests/Simcag.PriceAnalysisService.Tests.csproj -c Release --no-restore --verbosity normal --logger "trx;LogFileName=test-results.trx"
        
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-price-analysis-service
          path: "**/test-results.trx"
          retention-days: 30

  build-and-publish:
    name: Build & Publish Docker Image
    runs-on: ubuntu-latest
    if: |
      github.event_name != 'pull_request' ||
      github.event.inputs.publish == 'true'
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        id: docker_build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./price-analysis-service/Simcag.PriceAnalysisService.Api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max
          build-args: |
            BUILD_CONFIGURATION=Release
            DOTNET_SDK_VERSION=10.0
            DOTNET_RUNTIME_VERSION=10.0

      - name: Image digest
        run: echo "Image pushed with digest: ${{ steps.docker_build.outputs.digest }}"
